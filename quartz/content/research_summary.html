<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />

<style>
  :root {
    --bg: #fbfaf7;
    --ink: #1a1a1a;
    --green: #2fa37a;
    --yellow: #f3c64a;
    --red: #d8584a;
    --grey: #cfcfcf;
    --grey-dark: #9a9a9a;
    --blue: #1e6fbf;
    --mono: "JetBrains Mono", ui-monospace, "SFMono-Regular", Menlo, monospace;
    --sans: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
  }

  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--ink);
    font-family: var(--sans);
    min-height: 100vh;
  }

  .page {
    max-width: 1100px;
    margin: 0 auto;
    padding: 40px 32px 80px;
  }

  header {
    display: flex;
    flex-wrap: wrap;
    align-items: baseline;
    justify-content: space-between;
    gap: 16px;
    margin-bottom: 24px;
    border-bottom: 1px solid #e6e3dc;
    padding-bottom: 16px;
  }

  header h1 {
    font-family: var(--mono);
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin: 0;
    color: #555;
  }

  .controls {
    display: flex;
    gap: 8px;
    align-items: center;
    font-family: var(--mono);
    font-size: 12px;
  }

  .controls button {
    font-family: var(--mono);
    font-size: 12px;
    background: var(--ink);
    color: var(--bg);
    border: 0;
    padding: 6px 12px;
    border-radius: 4px;
    cursor: pointer;
    letter-spacing: 0.04em;
  }
  .controls button.ghost {
    background: transparent;
    color: var(--ink);
    border: 1px solid #d6d2c8;
  }
  .controls button:hover { opacity: 0.85; }

  .stage {
    background: var(--bg);
    border: 1px solid #ece9e1;
    border-radius: 12px;
    padding: 8px;
    aspect-ratio: 1 / 1;
    width: 100%;
    max-width: 880px;
    margin: 0 auto;
  }

  svg.schematic {
    width: 100%;
    height: 100%;
    display: block;
  }

  /* ---- Animation timing ----
     0  → 0.6   radial A
     0.6→ 1.2   radial T
     1.2→ 1.8   radial D
     1.8→ 2.0   hold
     2.0→ 2.8   cycle A→T
     2.8→ 3.6   cycle T→D
     3.6→ 4.4   cycle D→A
     4.4→ 5.2   hold
     total: 5.2s, repeat
  */

  .radial, .cycle-arrow {
    opacity: 0;
  }

  /* radial arrows: scale from center outward + fade in */
  .radial {
    transform-box: fill-box;
    transform-origin: var(--ox, 50%) var(--oy, 50%);
  }

  @keyframes radialPop {
    0%   { opacity: 0; transform: scale(0.2); }
    20%  { opacity: 1; transform: scale(1.08); }
    35%  { transform: scale(1); }
    100% { opacity: 1; transform: scale(1); }
  }

  .radial.r1 { animation: radialPop 5.2s ease-out infinite; animation-delay: 0s; }
  .radial.r2 { animation: radialPop 5.2s ease-out infinite; animation-delay: 0s; }
  .radial.r3 { animation: radialPop 5.2s ease-out infinite; animation-delay: 0s; }

  /* Stagger by playing them as offset segments inside one timeline.
     Easier: separate keyframes per arrow that hold-then-fade-in. */

  @keyframes radialA {
    0%, 0%   { opacity: 0; transform: scale(0.2); }
    1%       { opacity: 0.4; transform: scale(0.4); }
    12%      { opacity: 1; transform: scale(1.06); }
    18%      { transform: scale(1); }
    100%     { opacity: 1; transform: scale(1); }
  }
  @keyframes radialT {
    0%, 11%   { opacity: 0; transform: scale(0.2); }
    12%       { opacity: 0.4; transform: scale(0.4); }
    23%       { opacity: 1; transform: scale(1.06); }
    29%       { transform: scale(1); }
    100%      { opacity: 1; transform: scale(1); }
  }
  @keyframes radialD {
    0%, 22%   { opacity: 0; transform: scale(0.2); }
    23%       { opacity: 0.4; transform: scale(0.4); }
    34%       { opacity: 1; transform: scale(1.06); }
    40%       { opacity: 1; transform: scale(1); }
    100%      { opacity: 1; transform: scale(1); }
  }

  .radial.r1 { animation: radialA 5.2s ease-out infinite; }
  .radial.r2 { animation: radialT 5.2s ease-out infinite; }
  .radial.r3 { animation: radialD 5.2s ease-out infinite; }

  /* cycle arrows: draw stroke from start to end using dash offset */
  .cycle-arrow path.body {
    stroke-dasharray: var(--len, 1000);
    stroke-dashoffset: var(--len, 1000);
  }

  @keyframes drawAT {
    0%, 38%   { stroke-dashoffset: var(--len); opacity: 1; }
    54%       { stroke-dashoffset: 0; opacity: 1; }
    100%      { stroke-dashoffset: 0; opacity: 1; }
  }
  @keyframes drawTD {
    0%, 54%   { stroke-dashoffset: var(--len); opacity: 1; }
    70%       { stroke-dashoffset: 0; opacity: 1; }
    100%      { stroke-dashoffset: 0; opacity: 1; }
  }
  @keyframes drawDA {
    0%, 70%   { stroke-dashoffset: var(--len); opacity: 1; }
    86%       { stroke-dashoffset: 0; opacity: 1; }
    100%      { stroke-dashoffset: 0; opacity: 1; }
  }

  @keyframes fadeWithStroke {
    0%, 38%  { opacity: 0; }
    40%      { opacity: 1; }
    100%     { opacity: 1; }
  }
  @keyframes fadeTD {
    0%, 54%  { opacity: 0; }
    56%      { opacity: 1; }
    100%     { opacity: 1; }
  }
  @keyframes fadeDA {
    0%, 70%  { opacity: 0; }
    72%      { opacity: 1; }
    100%     { opacity: 1; }
  }

  .cycle-arrow.c1 { animation: fadeWithStroke 5.2s linear infinite; }
  .cycle-arrow.c2 { animation: fadeTD 5.2s linear infinite; }
  .cycle-arrow.c3 { animation: fadeDA 5.2s linear infinite; }

  .cycle-arrow.c1 path.body { animation: drawAT 5.2s ease-in-out infinite; }
  .cycle-arrow.c2 path.body { animation: drawTD 5.2s ease-in-out infinite; }
  .cycle-arrow.c3 path.body { animation: drawDA 5.2s ease-in-out infinite; }

  /* arrowheads fade in when the line finishes drawing */
  @keyframes headAT { 0%, 52% { opacity: 0; } 56% { opacity: 1; } 100% { opacity: 1; } }
  @keyframes headTD { 0%, 68% { opacity: 0; } 72% { opacity: 1; } 100% { opacity: 1; } }
  @keyframes headDA { 0%, 84% { opacity: 0; } 88% { opacity: 1; } 100% { opacity: 1; } }
  .cycle-arrow.c1 .head { animation: headAT 5.2s linear infinite; }
  .cycle-arrow.c2 .head { animation: headTD 5.2s linear infinite; }
  .cycle-arrow.c3 .head { animation: headDA 5.2s linear infinite; }

  /* node pulse when its outgoing cycle arrow fires */
  @keyframes pulseA { 0%, 36% { filter: none; transform: scale(1); } 40% { transform: scale(1.04); } 48% { transform: scale(1); } 100% { transform: scale(1); } }
  @keyframes pulseT { 0%, 52% { transform: scale(1); } 56% { transform: scale(1.04); } 64% { transform: scale(1); } 100% { transform: scale(1); } }
  @keyframes pulseD { 0%, 68% { transform: scale(1); } 72% { transform: scale(1.04); } 80% { transform: scale(1); } 100% { transform: scale(1); } }

  .node {
    transform-box: fill-box;
    transform-origin: center;
  }
  .node.a { animation: pulseA 5.2s ease-in-out infinite; }
  .node.t { animation: pulseT 5.2s ease-in-out infinite; }
  .node.d { animation: pulseD 5.2s ease-in-out infinite; }

  /* paused state */
  .paused .radial,
  .paused .cycle-arrow,
  .paused .cycle-arrow path.body,
  .paused .cycle-arrow .head,
  .paused .node {
    animation-play-state: paused !important;
  }

  /* node text */
  .node-label {
    font-family: var(--mono);
    font-size: 22px;
    font-weight: 600;
    text-anchor: middle;
    fill: var(--ink);
  }
  .node-big {
    font-family: var(--mono);
    font-size: 56px;
    font-weight: 700;
    fill: var(--ink);
  }
  .center-text {
    font-family: var(--mono);
    font-size: 16px;
    font-weight: 500;
    text-anchor: middle;
    fill: #2c2c2c;
  }

  footer {
    margin-top: 28px;
    font-family: var(--mono);
    font-size: 11px;
    color: #888;
    text-align: center;
    letter-spacing: 0.03em;
  }
</style>
</head>
<body>
<div class="page">

  <div class="stage" id="stage">
    <svg class="schematic" viewBox="0 0 800 800" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <!-- arrowhead markers -->
        <marker id="arrowBlue" viewBox="0 0 12 12" refX="9" refY="6"
                markerWidth="8" markerHeight="8" orient="auto-start-reverse">
          <path d="M0,0 L12,6 L0,12 Z" fill="#1e6fbf"></path>
        </marker>
        <marker id="arrowBlack" viewBox="0 0 12 12" refX="9" refY="6"
                markerWidth="7" markerHeight="7" orient="auto-start-reverse">
          <path d="M0,0 L12,6 L0,12 Z" fill="#1a1a1a"></path>
        </marker>

        <!-- subtle stripe pattern for placeholder icons -->
        <pattern id="stripeGreen" patternUnits="userSpaceOnUse" width="10" height="10" patternTransform="rotate(45)">
          <rect width="10" height="10" fill="#2fa37a" opacity="0.18"></rect>
          <line x1="0" y1="0" x2="0" y2="10" stroke="#1f7c5c" stroke-width="2" opacity="0.35"></line>
        </pattern>
        <pattern id="stripeYellow" patternUnits="userSpaceOnUse" width="10" height="10" patternTransform="rotate(45)">
          <rect width="10" height="10" fill="#f3c64a" opacity="0.25"></rect>
          <line x1="0" y1="0" x2="0" y2="10" stroke="#a87d10" stroke-width="2" opacity="0.4"></line>
        </pattern>
        <pattern id="stripeRed" patternUnits="userSpaceOnUse" width="10" height="10" patternTransform="rotate(45)">
          <rect width="10" height="10" fill="#d8584a" opacity="0.2"></rect>
          <line x1="0" y1="0" x2="0" y2="10" stroke="#8e2c22" stroke-width="2" opacity="0.4"></line>
        </pattern>
        <pattern id="stripeGrey" patternUnits="userSpaceOnUse" width="10" height="10" patternTransform="rotate(45)">
          <rect width="10" height="10" fill="#bfbfbf" opacity="0.4"></rect>
          <line x1="0" y1="0" x2="0" y2="10" stroke="#7a7a7a" stroke-width="1.5" opacity="0.4"></line>
        </pattern>
      </defs>

      <!--
        Geometry:
          Center C = (400, 420)
          T node:  (400, 160)   radius 110     (top)
          A node:  (140, 620)   radius 110     (bottom-left)
          D node:  (660, 620)   radius 110     (bottom-right)
          Center grey circle: r = 95 around C
      -->

      <!-- ============ CYCLE ARROWS (drawn under nodes) ============ -->
      <!-- A → T : curves up the left side, outside the center hub -->
      <g class="cycle-arrow c1">
        <path class="body"
              d="M 175 510  C 100 380, 200 200, 320 145"
              stroke="#1a1a1a" stroke-width="9" fill="none" stroke-linecap="round"
              marker-end="url(#arrowBlack)"
              style="--len: 460;"></path>
        <circle class="head" cx="320" cy="145" r="0" fill="transparent"></circle>
      </g>

      <!-- T → D : curves down the right side -->
      <g class="cycle-arrow c2">
        <path class="body"
              d="M 480 145  C 600 200, 700 380, 625 510"
              stroke="#1a1a1a" stroke-width="9" fill="none" stroke-linecap="round"
              marker-end="url(#arrowBlack)"
              style="--len: 460;"></path>
        <circle class="head" cx="625" cy="510" r="0" fill="transparent"></circle>
      </g>

      <!-- D → A : along the bottom -->
      <g class="cycle-arrow c3">
        <path class="body"
              d="M 555 720  C 470 760, 330 760, 245 720"
              stroke="#1a1a1a" stroke-width="9" fill="none" stroke-linecap="round"
              marker-end="url(#arrowBlack)"
              style="--len: 360;"></path>
        <circle class="head" cx="245" cy="720" r="0" fill="transparent"></circle>
      </g>

      <!-- ============ CENTER HUB ============ -->
      <g class="center-hub">
        <circle cx="400" cy="420" r="105" fill="#dcdcdc" stroke="#b8b8b8" stroke-width="2"></circle>
        <!-- dashed inner contour -->
        <ellipse cx="400" cy="420" rx="80" ry="68"
                 fill="none" stroke="#8a8a8a" stroke-width="1.5" stroke-dasharray="5 5"></ellipse>

        <!-- placeholder energy-domain glyphs (geometric, original) -->
        <!-- battery -->
        <g transform="translate(355 390)">
          <rect x="0" y="0" width="24" height="14" rx="2" fill="url(#stripeGrey)" stroke="#3a3a3a" stroke-width="1.5"></rect>
          <rect x="24" y="4" width="3" height="6" fill="#3a3a3a"></rect>
          <line x1="6" y1="2" x2="6" y2="12" stroke="#d8584a" stroke-width="1.5"></line>
          <line x1="11" y1="2" x2="11" y2="12" stroke="#f3c64a" stroke-width="1.5"></line>
          <line x1="16" y1="2" x2="16" y2="12" stroke="#2fa37a" stroke-width="1.5"></line>
        </g>
        <!-- turbine -->
        <g transform="translate(400 388)">
          <line x1="6" y1="6" x2="6" y2="22" stroke="#3a3a3a" stroke-width="1.5"></line>
          <circle cx="6" cy="6" r="2" fill="#3a3a3a"></circle>
          <path d="M6 6 L1 -2 L4 6 Z" fill="#1e6fbf"></path>
          <path d="M6 6 L13 1 L7 8 Z" fill="#1e6fbf"></path>
          <path d="M6 6 L9 14 L4 8 Z" fill="#1e6fbf"></path>
        </g>
        <!-- flask -->
        <g transform="translate(370 430)">
          <path d="M6 0 L6 6 L0 18 L18 18 L12 6 L12 0 Z"
                fill="url(#stripeGreen)" stroke="#1f7c5c" stroke-width="1.5"></path>
          <line x1="2" y1="0" x2="16" y2="0" stroke="#3a3a3a" stroke-width="1.5"></line>
          <circle cx="6" cy="14" r="1.2" fill="#2fa37a"></circle>
          <circle cx="10" cy="11" r="0.8" fill="#2fa37a"></circle>
        </g>
        <!-- chip -->
        <g transform="translate(410 432)">
          <rect x="0" y="0" width="18" height="18" rx="2" fill="#1e6fbf" opacity="0.18" stroke="#1e6fbf" stroke-width="1.5"></rect>
          <rect x="5" y="5" width="8" height="8" fill="#1e6fbf"></rect>
          <line x1="-2" y1="4" x2="0" y2="4" stroke="#1e6fbf" stroke-width="1.2"></line>
          <line x1="-2" y1="9" x2="0" y2="9" stroke="#1e6fbf" stroke-width="1.2"></line>
          <line x1="-2" y1="14" x2="0" y2="14" stroke="#1e6fbf" stroke-width="1.2"></line>
          <line x1="18" y1="4" x2="20" y2="4" stroke="#1e6fbf" stroke-width="1.2"></line>
          <line x1="18" y1="9" x2="20" y2="9" stroke="#1e6fbf" stroke-width="1.2"></line>
          <line x1="18" y1="14" x2="20" y2="14" stroke="#1e6fbf" stroke-width="1.2"></line>
        </g>

        <!-- caption below center -->
        <text class="center-text" x="400" y="600">Intelligent Electrochemical</text>
        <text class="center-text" x="400" y="624">Energy (IE^2) Lab</text>
        <text class="center-text" x="400" y="648">research directions</text>
      </g>

      <!-- ============ RADIAL ARROWS (center → node) ============ -->
      <!-- A is index 1 (bottom-left) per the prompt: arrows "one by one" -->
      <!-- radial r1 : center → A (bottom-left) -->
      <g class="radial r1" style="--ox: 50%; --oy: 50%;">
        <line x1="335" y1="475" x2="225" y2="565"
              stroke="#1e6fbf" stroke-width="12" stroke-linecap="round"
              marker-end="url(#arrowBlue)"></line>
      </g>
      <!-- radial r2 : center → T (top) -->
      <g class="radial r2" style="--ox: 50%; --oy: 50%;">
        <line x1="400" y1="350" x2="400" y2="240"
              stroke="#1e6fbf" stroke-width="12" stroke-linecap="round"
              marker-end="url(#arrowBlue)"></line>
      </g>
      <!-- radial r3 : center → D (bottom-right) -->
      <g class="radial r3" style="--ox: 50%; --oy: 50%;">
        <line x1="465" y1="475" x2="575" y2="565"
              stroke="#1e6fbf" stroke-width="12" stroke-linecap="round"
              marker-end="url(#arrowBlue)"></line>
      </g>

      <!-- ============ THREE NODES ============ -->
      <!-- T : Trustworthy Foundation AI (top, green) -->
      <g class="node t">
        <circle cx="400" cy="160" r="115" fill="#2fa37a" stroke="#1f7c5c" stroke-width="3"></circle>
        <!-- open-book placeholder: two rectangles + spine -->
        <g transform="translate(335 110)">
          <rect x="0" y="0" width="60" height="70" rx="3" fill="#fff" stroke="#1a1a1a" stroke-width="2"></rect>
          <rect x="60" y="0" width="60" height="70" rx="3" fill="#fff" stroke="#1a1a1a" stroke-width="2"></rect>
          <line x1="60" y1="0" x2="60" y2="70" stroke="#1a1a1a" stroke-width="2"></line>
          <!-- left page: flask glyph -->
          <rect x="10" y="14" width="40" height="42" fill="url(#stripeGreen)"></rect>
          <path d="M22 26 L22 32 L14 50 L42 50 L34 32 L34 26 Z"
                fill="#2fa37a" stroke="#1a1a1a" stroke-width="1.5"></path>
          <!-- right page: neural-net dots -->
          <circle cx="74" cy="20" r="3" fill="#1e6fbf"></circle>
          <circle cx="74" cy="40" r="3" fill="#1e6fbf"></circle>
          <circle cx="74" cy="60" r="3" fill="#1e6fbf"></circle>
          <circle cx="95" cy="30" r="3" fill="#2fa37a"></circle>
          <circle cx="95" cy="50" r="3" fill="#2fa37a"></circle>
          <circle cx="115" cy="40" r="3" fill="#d8584a"></circle>
          <line x1="74" y1="20" x2="95" y2="30" stroke="#1a1a1a" stroke-width="1"></line>
          <line x1="74" y1="20" x2="95" y2="50" stroke="#1a1a1a" stroke-width="1"></line>
          <line x1="74" y1="40" x2="95" y2="30" stroke="#1a1a1a" stroke-width="1"></line>
          <line x1="74" y1="40" x2="95" y2="50" stroke="#1a1a1a" stroke-width="1"></line>
          <line x1="74" y1="60" x2="95" y2="30" stroke="#1a1a1a" stroke-width="1"></line>
          <line x1="74" y1="60" x2="95" y2="50" stroke="#1a1a1a" stroke-width="1"></line>
          <line x1="95" y1="30" x2="115" y2="40" stroke="#1a1a1a" stroke-width="1"></line>
          <line x1="95" y1="50" x2="115" y2="40" stroke="#1a1a1a" stroke-width="1"></line>
        </g>
        <!-- big letter T -->
        <text class="node-big" x="400" y="55" text-anchor="middle">T</text>
        <!-- node label -->
        <text class="node-label" x="400" y="210">Trustworthy,</text>
        <text class="node-label" x="400" y="236">Foundation AI</text>
      </g>

      <!-- A : Automated Literature Mining (bottom-left, yellow) -->
      <g class="node a">
        <circle cx="140" cy="620" r="115" fill="#f3c64a" stroke="#a87d10" stroke-width="3"></circle>
        <!-- document placeholder with bars -->
        <g transform="translate(80 565)">
          <rect x="0" y="0" width="60" height="76" rx="2" fill="#fff" stroke="#1a1a1a" stroke-width="2"></rect>
          <line x1="8" y1="10" x2="48" y2="10" stroke="#1a1a1a" stroke-width="1.5"></line>
          <line x1="8" y1="18" x2="48" y2="18" stroke="#1a1a1a" stroke-width="1.5"></line>
          <line x1="8" y1="26" x2="40" y2="26" stroke="#1a1a1a" stroke-width="1.5"></line>
          <!-- bar chart -->
          <rect x="10" y="58" width="6" height="10" fill="#d8584a"></rect>
          <rect x="20" y="48" width="6" height="20" fill="#f3c64a" stroke="#1a1a1a" stroke-width="1"></rect>
          <rect x="30" y="40" width="6" height="28" fill="#1e6fbf"></rect>
          <rect x="40" y="52" width="6" height="16" fill="#2fa37a"></rect>
        </g>
        <!-- second sheet behind -->
        <g transform="translate(95 555)">
          <rect x="0" y="0" width="60" height="76" rx="2" fill="#fff" stroke="#1a1a1a" stroke-width="2" opacity="0.6"></rect>
        </g>
        <!-- big A -->
        <text class="node-big" x="35" y="700" text-anchor="middle">A</text>
        <!-- label -->
        <text class="node-label" x="140" y="676">Automated</text>
        <text class="node-label" x="140" y="702">Literature Mining</text>
      </g>

      <!-- D : Multiscale Simulations (bottom-right, red) -->
      <g class="node d">
        <circle cx="660" cy="620" r="115" fill="#d8584a" stroke="#8e2c22" stroke-width="3"></circle>
        <!-- multiscale: three nested squares + lattice -->
        <g transform="translate(605 565)">
          <!-- monitor -->
          <rect x="0" y="0" width="100" height="62" rx="3" fill="#fff" stroke="#1a1a1a" stroke-width="2"></rect>
          <rect x="40" y="62" width="20" height="6" fill="#1a1a1a"></rect>
          <rect x="30" y="68" width="40" height="3" fill="#1a1a1a"></rect>
          <!-- nested scale boxes -->
          <rect x="6" y="6" width="88" height="50" fill="none" stroke="#1a1a1a" stroke-width="1" stroke-dasharray="3 3"></rect>
          <rect x="18" y="14" width="40" height="34" fill="none" stroke="#1a1a1a" stroke-width="1"></rect>
          <rect x="26" y="20" width="20" height="20" fill="none" stroke="#1a1a1a" stroke-width="1"></rect>
          <!-- atoms in inner box -->
          <circle cx="30" cy="24" r="2" fill="#1e6fbf"></circle>
          <circle cx="38" cy="28" r="2" fill="#2fa37a"></circle>
          <circle cx="34" cy="34" r="2" fill="#d8584a"></circle>
          <circle cx="42" cy="36" r="2" fill="#f3c64a"></circle>
          <line x1="30" y1="24" x2="38" y2="28" stroke="#1a1a1a" stroke-width="0.8"></line>
          <line x1="38" y1="28" x2="34" y2="34" stroke="#1a1a1a" stroke-width="0.8"></line>
          <line x1="34" y1="34" x2="42" y2="36" stroke="#1a1a1a" stroke-width="0.8"></line>
          <line x1="38" y1="28" x2="42" y2="36" stroke="#1a1a1a" stroke-width="0.8"></line>
          <!-- arrow between scales -->

    Loop: radial fan-out (center → A → T → M) then cyclic flow (A → T → M → A) · 5.2s
  </footer>
</div>

<script>
  const stage = document.getElementById('stage');
  const pauseBtn = document.getElementById('pauseBtn');
  const restartBtn = document.getElementById('restartBtn');

  pauseBtn.addEventListener('click', () => {
    stage.classList.toggle('paused');
    pauseBtn.textContent = stage.classList.contains('paused') ? 'Play' : 'Pause';
  });

  restartBtn.addEventListener('click', () => {
    // force reflow to restart CSS animations
    const svg = stage.querySelector('svg');
    svg.style.display = 'none';
    // eslint-disable-next-line no-unused-expressions
    svg.offsetHeight;
    svg.style.display = '';
  });
</script>
